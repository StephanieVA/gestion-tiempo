<div class="login-container">
  <div class="login-card">
    <div class="header">
      <h1>Gestión del Tiempo</h1>
      <p>Acceso al cuestionario estudiantil</p>
    </div>

    <div class="form-group">
      <label for="codigo">Código Universitario</label>
      <input
        id="codigo"
        type="text"
        [(ngModel)]="codigo"
        placeholder="Ejemplo: 2026001"
      />
    </div>

    <div class="form-group">
      <label for="password">Contraseña</label>
      <input
        id="password"
        type="password"
        [(ngModel)]="password"
        placeholder="Ingrese su contraseña"
      />
    </div>

    <button class="btn-login" (click)="login()">Ingresar</button>

    <div class="footer">Universidad Nacional del Centro del Perú</div>
  </div>
</div>
